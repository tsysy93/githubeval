<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Page Stylée</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }

    header h1 {
      font-size: 24px;
      letter-spacing: 1px;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00d4ff;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: #00d4ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      transform: scale(1.05);
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      width: 250px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      background: rgba(255,255,255,0.2);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.2);
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <h1>MonSite</h1>
  <nav>
    <a href="#">Accueil</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>Bienvenue 👋</h2>
    <p>Une page moderne avec un design propre et élégant.</p>
    <button class="btn">Commencer</button>
  </div>
</section>

<section class="cards">
  <div class="card">
    <h3>Rapide</h3>
    <p>Optimisé pour la performance.</p>
  </div>
  <div class="card">
    <h3>Moderne</h3>
    <p>Design tendance avec effets visuels.</p>
  </div>
  <div class="card">
    <h3>Responsive</h3>
    <p>Adapté à tous les écrans.</p>
  </div>
</section>

<footer>
  © 2026 - Ton site stylé
</footer>

</body>
</html>
